<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>SalesScout — AI Sales Intelligence for Freight Brokers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* =============================================================
   DESIGN TOKENS — edit colors and timing here
   ============================================================= */
:root {
  --color-bg:               #000000;
  --color-frame:            #1a1a1a;
  --color-blue:             #1a6fff;
  --color-blue-light:       #4db8ff;
  --color-bubble-user:      #1a6fff;
  --color-bubble-assistant: #1c1c1e;
  --color-bubble-progress:  #0f0f0f;
  --color-bubble-decision-start: #0a1a3a;
  --color-bubble-decision-end:   #0a0f1f;
  --color-text-primary:     #ffffff;
  --color-text-secondary:   #999999;
  --color-text-muted:       #666666;
  --timing-progress-gap:    600ms;
  --timing-bubble-gap:      800ms;
  --timing-scene-gap:       800ms;
  --timing-typing-min:      800ms;
}

/* =============================================================
   RESET + BASE
   ============================================================= */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--color-bg);
  font-family: 'Inter', -apple-system, sans-serif;
  color: var(--color-text-primary);
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* =============================================================
   CANVAS VIGNETTE — radial behind phone only
   ============================================================= */
.vignette {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 1000px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0) 30%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
  z-index: 0;
}

/* =============================================================
   WORDMARK — above phone
   ============================================================= */
.wordmark {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-bottom: 20px;
  transition: opacity 600ms ease;
}
.wordmark.hidden { opacity: 0; }
.wordmark-title {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.wordmark-title .blue { color: var(--color-blue-light); }
.wordmark-tagline {
  font-size: 15px;
  font-weight: 400;
  color: var(--color-text-muted);
  margin-top: 4px;
}

/* =============================================================
   iPHONE FRAME
   ============================================================= */
.phone-wrap {
  position: relative;
  z-index: 1;
  transition: opacity 600ms ease;
}
.phone-wrap.fade-out { opacity: 0; }

.phone {
  position: relative;
  width: 390px;
  height: 844px;
  background: var(--color-frame);
  border-radius: 54px;
  padding: 12px;
  box-shadow:
    0 0 0 1px rgba(26,111,255,0.15),
    0 40px 80px rgba(0,0,0,0.7);
}

/* Side buttons — CSS only */
.side-btn {
  position: absolute;
  background: #2a2a2a;
  border-radius: 2px;
}
/* Left side: mute switch */
.side-btn.mute   { left: -3px; top: 160px; width: 3px; height: 28px; }
/* Left side: volume up */
.side-btn.vol-up { left: -3px; top: 210px; width: 3px; height: 52px; }
/* Left side: volume down */
.side-btn.vol-dn { left: -3px; top: 272px; width: 3px; height: 52px; }
/* Right side: power */
.side-btn.power  { right: -3px; top: 230px; width: 3px; height: 80px; }

/* Inner screen */
.screen {
  position: relative;
  width: 100%;
  height: 100%;
  background: var(--color-bg);
  border-radius: 44px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Dynamic Island */
.dynamic-island {
  position: absolute;
  top: 11px;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 36px;
  background: #000;
  border-radius: 20px;
  z-index: 10;
}

/* Status bar */
.status-bar {
  position: relative;
  z-index: 5;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 28px 0;
  height: 54px;
  flex-shrink: 0;
}
.status-bar .sb-time {
  font-size: 15px;
  font-weight: 600;
  color: #fff;
}
.status-bar .sb-icons {
  display: flex;
  align-items: center;
  gap: 5px;
}
.status-bar .sb-icons svg { width: 16px; height: 16px; fill: #fff; }

/* =============================================================
   iMESSAGE HEADER
   ============================================================= */
.imsg-header {
  display: flex;
  align-items: center;
  padding: 8px 16px 10px;
  background: #1c1c1e;
  flex-shrink: 0;
  gap: 10px;
}
.imsg-back {
  font-size: 28px;
  color: var(--color-blue);
  font-weight: 300;
  line-height: 1;
  margin-right: 2px;
}
.imsg-badge {
  font-size: 16px;
  color: var(--color-blue);
  font-weight: 500;
}
.imsg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--color-blue), var(--color-blue-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}
.imsg-name {
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  flex: 1;
}
.imsg-video {
  flex-shrink: 0;
  opacity: 0.5;
}
.imsg-video svg { width: 24px; height: 24px; fill: var(--color-blue); }

/* =============================================================
   MESSAGE AREA
   ============================================================= */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 0; }

/* Timestamp gap */
.timestamp {
  text-align: center;
  font-size: 11px;
  color: var(--color-text-muted);
  padding: 8px 0 4px;
}

/* Read receipt */
.read-receipt {
  text-align: right;
  font-size: 11px;
  color: var(--color-text-muted);
  padding: 2px 4px 4px;
  opacity: 0;
  transition: opacity 200ms ease;
}
.read-receipt.show { opacity: 1; }

/* =============================================================
   MESSAGE BUBBLES
   ============================================================= */
.msg {
  max-width: 80%;
  padding: 10px 14px;
  font-size: 15px;
  line-height: 1.45;
  opacity: 0;
  transform: translateY(8px);
  font-weight: 400;
}
.msg.preloaded {
  opacity: 1;
  transform: none;
}
.msg.show {
  opacity: 1;
  transform: translateY(0);
}

/* User bubbles — right aligned, iMessage blue */
.msg.user {
  align-self: flex-end;
  background: var(--color-bubble-user);
  color: #fff;
  border-radius: 18px 18px 4px 18px;
  transform: translateX(20px);
}
.msg.user.preloaded { transform: none; }
.msg.user.show {
  animation: slideInRight 200ms ease-out forwards;
}

/* Assistant bubbles — left aligned, dark grey */
.msg.assistant {
  align-self: flex-start;
  background: var(--color-bubble-assistant);
  color: #fff;
  border-radius: 18px 18px 18px 4px;
}
.msg.assistant.show {
  animation: fadeSlideUp 300ms ease-out forwards;
}
.msg.assistant.preloaded {
  opacity: 1;
  transform: none;
}

/* Progress bubbles */
.msg.progress {
  align-self: flex-start;
  background: var(--color-bubble-progress);
  color: var(--color-text-muted);
  border-radius: 18px 18px 18px 4px;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 12px;
}
.msg.progress .spinner {
  display: inline-block;
  width: 10px;
  height: 10px;
  border: 1.5px solid #333;
  border-top-color: var(--color-blue-light);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}
.msg.progress .checkmark {
  display: none;
  color: var(--color-blue-light);
  font-size: 13px;
  margin-right: 6px;
  vertical-align: middle;
}
.msg.progress.checked .spinner { display: none; }
.msg.progress.checked .checkmark { display: inline; }
.msg.progress.checked { color: var(--color-text-secondary); }

/* Decision bubbles — full width, blue accent */
.msg.decision {
  align-self: flex-start;
  max-width: 92%;
  background: linear-gradient(135deg, var(--color-bubble-decision-start), var(--color-bubble-decision-end));
  border-left: 3px solid var(--color-blue);
  border-radius: 18px 18px 18px 4px;
  color: var(--color-blue-light);
  font-size: 16px;
  font-weight: 600;
  padding: 12px 16px;
  box-shadow: rgba(26,111,255,0.2) -4px 0px 16px;
}

/* Typing indicator */
.typing {
  align-self: flex-start;
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: var(--color-bubble-assistant);
  border-radius: 18px 18px 18px 4px;
  opacity: 0;
}
.typing.show { opacity: 1; }
.typing span {
  width: 7px;
  height: 7px;
  background: #555;
  border-radius: 50%;
  animation: pulse 1.2s ease-in-out infinite;
}
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }

/* =============================================================
   iMESSAGE INPUT BAR
   ============================================================= */
.imsg-input {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px 28px;
  flex-shrink: 0;
}
.imsg-plus {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #333;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.imsg-plus svg { width: 16px; height: 16px; fill: #fff; }
.imsg-field {
  flex: 1;
  background: transparent;
  border: 1px solid #3a3a3c;
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 15px;
  color: #8e8e93;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.imsg-mic { flex-shrink: 0; opacity: 0.4; }
.imsg-mic svg { width: 18px; height: 18px; fill: #8e8e93; }

/* Home indicator */
.home-indicator {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  background: rgba(255,255,255,0.4);
  border-radius: 3px;
  z-index: 5;
}

/* =============================================================
   NOTIFICATION BANNER
   ============================================================= */
.notif-banner {
  position: absolute;
  top: 54px;
  left: 12px;
  right: 12px;
  z-index: 50;
  background: rgba(20,20,20,0.9);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 12px 14px;
  transform: translateY(-150%);
  transition: transform 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.notif-banner.show { transform: translateY(0); }
.notif-banner .nb-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.notif-banner .nb-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--color-blue), var(--color-blue-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}
.notif-banner .nb-app { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.5); }
.notif-banner .nb-time { font-size: 12px; color: rgba(255,255,255,0.35); margin-left: auto; }
.notif-banner .nb-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 2px; }
.notif-banner .nb-body { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.35; }

/* =============================================================
   CLOSING OVERLAY
   ============================================================= */
#closingOverlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 600ms ease;
}
#closingOverlay.show { opacity: 1; pointer-events: auto; }
.cl-line1 {
  font-size: 52px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.92px;
}
.cl-line2 {
  font-size: 52px;
  font-weight: 600;
  letter-spacing: -0.92px;
  background: linear-gradient(90deg, #1a6fff, #4db8ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.cl-sub {
  color: var(--color-text-secondary);
  font-size: 18px;
  font-weight: 400;
  margin-top: 20px;
}
.cl-cta {
  display: inline-block;
  margin-top: 32px;
  padding: 14px 36px;
  background: var(--color-blue);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow:
    rgba(26,111,255,0.2) 0px 6px 28px -1px,
    rgba(0,0,0,0.09) 0px 4px 9px 0px,
    rgba(255,255,255,0.05) 0px 10px 32px inset,
    rgba(74,184,255,0.15) 2px 2px 2px inset,
    rgba(0,20,80,0.25) -1px -1px 6px inset;
}

/* =============================================================
   CONTROLS
   ============================================================= */
.controls {
  position: relative;
  z-index: 2;
  margin-top: 40px;
  display: flex;
  gap: 10px;
  transition: opacity 600ms ease;
}
.controls.hidden { opacity: 0; pointer-events: none; }
.ctrl-btn {
  padding: 10px 28px;
  border-radius: 999px;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 150ms;
  box-shadow:
    rgba(26,111,255,0.2) 0px 6px 28px -1px,
    rgba(0,0,0,0.09) 0px 4px 9px 0px,
    rgba(255,255,255,0.05) 0px 10px 32px inset,
    rgba(74,184,255,0.15) 2px 2px 2px inset,
    rgba(0,20,80,0.25) -1px -1px 6px inset;
}
.ctrl-btn.primary {
  background: var(--color-blue);
  color: #fff;
}
.ctrl-btn.primary:hover {
  transform: translateY(-1px);
  box-shadow:
    rgba(26,111,255,0.35) 0px 6px 28px -1px,
    rgba(0,0,0,0.09) 0px 4px 9px 0px,
    rgba(255,255,255,0.05) 0px 10px 32px inset,
    rgba(74,184,255,0.15) 2px 2px 2px inset,
    rgba(0,20,80,0.25) -1px -1px 6px inset;
}
.ctrl-btn.secondary {
  background: #0a0a0a;
  color: var(--color-text-muted);
}
.ctrl-btn.secondary:hover { color: #fff; }
.ctrl-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
}

/* =============================================================
   KEYFRAMES
   ============================================================= */
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
  40% { transform: scale(1.1); opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

</div>

<!-- iPhone frame -->
<div class="phone-wrap" id="phoneWrap">

<script>
// =============================================================
// CONFIG — All demo content, timing, and scene data.
// Edit copy, delays, and scenes ONLY here.
// =============================================================
const CONFIG = {

  // ── Timing (ms) — every delay is editable ──
  timing: {
    typingMin:      800,   // minimum typing indicator display
    progressGap:    600,   // gap between progress bubbles
    bubbleGap:      800,   // gap between assistant response bubbles
    sceneGap:       800,   // pause between major scenes
    userPause:      400,   // pause after user message appears
    readReceiptDelay: 300, // delay before "Read" shows
    checkmarkGap:   200,   // gap between progress checkmark swaps
    checkmarkPause: 300,   // pause after all checkmarks before responses
    notifHold:      2500,  // notification banner display time
    phoneFadeOut:   600,   // phone fade before closing card
    closingHold:    5000,  // closing card hold time
  },

  // ── Pre-loaded messages (visible before demo starts) ──
  preloaded: [
    { type: 'user', text: 'Brief House of Raeford Farms' },
    { type: 'assistant', text: 'PURSUE NOW \u2014 brief saved to your morning list.' },
  ],

  // ── Scene content — exact copy, do not change ──
  scenes: [

    // SCENE 1 — The Query
    {
      user: 'Find me Southeast food shippers most brokers aren\u2019t calling yet. Real freight complexity, active trigger events.',
      readReceipt: true,
      progress: [
        'Researching Southeast shippers\u2026',
        'Scanning recent facility announcements and trigger events\u2026',
        'Filtering for complexity and open decision windows\u2026',
      ],
      responses: [
        { text: '2 high-priority prospects identified.\nDecision windows open NOW.' },
        { text: 'VIBRANT HEALTH PRODUCTS \u2014 Rossville, TN\n$48.5M facility opening this quarter\n394 jobs \u2014 first US manufacturing location\nSupply chain being built from scratch\n\nFreight Profile:\nReefer + organic handling required\nCross-border inbound from Canada\nSoutheast outbound distribution\n\nTrigger: Making vendor decisions THIS QUARTER' },
        { text: '\u26a1 Decision: PURSUE NOW', style: 'decision' },
        { text: 'FINE ORGANIC INDUSTRIES \u2014 Jonesville, SC\nFirst US facility, construction underway\nFood-grade specialty ingredients\nOutbound to CPG manufacturers nationwide\n\nTrigger: Freight relationships forming right now.\nNo broker has this account yet.' },
        { text: '\u26a1 Decision: PURSUE NOW', style: 'decision' },
      ],
    },

    // SCENE 2 — Outreach Draft
    {
      user: 'draft outreach for Vibrant Health',
      readReceipt: true,
      progress: [
        'Drafting outreach\u2026',

// =============================================================
// ENGINE — drives the demo, do not edit unless changing behavior
// =============================================================
const $ = s => document.querySelector(s);
const msgBox      = $('#messages');
const startBtn    = $('#startBtn');
const replayBtn   = $('#replayBtn');
const phoneWrap   = $('#phoneWrap');
const wordmark    = $('#wordmark');
const controls    = $('#controls');
const closingOv   = $('#closingOverlay');
const notifBanner = $('#notifBanner');
let running = false;

startBtn.addEventListener('click', () => runDemo());
replayBtn.addEventListener('click', () => runDemo());

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function scroll() { msgBox.scrollTop = msgBox.scrollHeight; }

// ── Add elements to chat ──
function addBubble(type, text, style, preloaded) {
  const div = document.createElement('div');
  let cls = 'msg ' + type;
  if (style) cls += ' ' + style;
  if (preloaded) cls += ' preloaded';
  div.className = cls;
  div.style.whiteSpace = 'pre-line';
  div.textContent = text;
  msgBox.appendChild(div);
  if (!preloaded) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      div.classList.add('show');
      scroll();
    }));
  } else {
    scroll();
  }
  return div;
}

function addTimestamp(text) {
  const div = document.createElement('div');
  div.className = 'timestamp';
  div.textContent = text;
  msgBox.appendChild(div);
  scroll();
}

function addReadReceipt() {
  const div = document.createElement('div');
  div.className = 'read-receipt';
  div.textContent = 'Read 9:41 AM';
  msgBox.appendChild(div);
  scroll();
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  msgBox.appendChild(div);
  requestAnimationFrame(() => { div.classList.add('show'); scroll(); });
  return div;
}
function removeTyping(el) { if (el?.parentNode) el.parentNode.removeChild(el); }

function addProgress(text) {
  const div = document.createElement('div');
  div.className = 'msg progress';
  div.innerHTML = '<span class="spinner"></span><span class="checkmark">\u2713</span>';
  const span = document.createElement('span');
  span.textContent = text;
  div.appendChild(span);
  msgBox.appendChild(div);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    div.classList.add('show');
    scroll();
  }));
  return div;
}

// ── Play a single scene ──
async function playScene(scene) {
  const t = CONFIG.timing;

  // User message
  if (scene.user) {
    addBubble('user', scene.user);
    await sleep(t.userPause);

    // Read receipt
    if (scene.readReceipt) {
      const rr = addReadReceipt();
      await sleep(t.readReceiptDelay);
      rr.classList.add('show');
    }
    await sleep(200);
  }

  // Typing before progress
  if (scene.progress.length > 0) {
    const typing = showTyping();
    await sleep(t.typingMin);
    removeTyping(typing);
  }

  // Progress bubbles — sequential
  const progressEls = [];
  for (const p of scene.progress) {
    progressEls.push(addProgress(p));
    await sleep(t.progressGap);
  }

  // Checkmark swap when results arrive
  if (progressEls.length > 0 && scene.responses.length > 0) {
    for (let i = 0; i < progressEls.length; i++) {
      progressEls[i].classList.add('checked');
      await sleep(t.checkmarkGap);
    }
    await sleep(t.checkmarkPause);
  }

  // Typing before responses (if no progress)
  if (scene.progress.length === 0 && scene.responses.length > 0) {
    const typing = showTyping();
    await sleep(t.typingMin);
    removeTyping(typing);
  }

  // Response bubbles — sequential
  const gap = scene.responseGap || t.bubbleGap;
  for (const r of scene.responses) {
    addBubble(r.style === 'decision' ? 'assistant' : 'assistant', r.text, r.style || '');
    await sleep(gap);
  }
}

// ── Notification banner ──
async function playNotification() {
  const t = CONFIG.timing;
  const n = CONFIG.notification;
  $('#nbTitle').textContent = n.title;
  $('#nbBody').textContent = n.body;
  notifBanner.classList.add('show');
  await sleep(t.notifHold);
  notifBanner.classList.remove('show');
  await sleep(500);
}

// ── Closing card ──
async function playClosing() {
  const t = CONFIG.timing;
  // Fade phone + wordmark + controls
  phoneWrap.classList.add('fade-out');
  wordmark.classList.add('hidden');
  controls.classList.add('hidden');
  await sleep(t.phoneFadeOut);

  closingOv.classList.add('show');
  await sleep(t.closingHold);
}

// ── Load pre-loaded messages ──
function loadPreloaded() {
  CONFIG.preloaded.forEach(m => {
    addBubble(m.type, m.text, '', true);
  });
  addTimestamp('Today 9:41 AM');
}

// ── Main demo runner ──
async function runDemo() {
  if (running) return;
  running = true;
  startBtn.disabled = true;
  replayBtn.disabled = true;
  const t = CONFIG.timing;

  // Reset
  msgBox.innerHTML = '';
  closingOv.classList.remove('show');
  phoneWrap.classList.remove('fade-out');
  wordmark.classList.remove('hidden');
  controls.classList.remove('hidden');
  notifBanner.classList.remove('show');

  // Load pre-loaded messages
  loadPreloaded();
  await sleep(600);

  // Play all scenes in order
  for (const scene of CONFIG.scenes) {
    await playScene(scene);
    await sleep(t.sceneGap);
  }

  // Notification
  await playNotification();

  // Closing
  await playClosing();

  running = false;
  startBtn.disabled = false;
  replayBtn.disabled = false;
  startBtn.textContent = 'Start Demo';
}
</script>
